name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  ci:
    name: Lint, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run protocol codegen
        run: pnpm codegen

      - name: Verify generated files are committed
        run: |
          git diff --exit-code || (
            echo "Generated files are out of date. Run 'pnpm codegen' and commit the changes."
            exit 1
          )

      - name: Lint TypeScript/JSON/CSS with Biome
        run: pnpm lint

      - name: Build VS Code extension
        run: pnpm --filter @vocode/vscode-extension build

      - name: Build daemon
        run: pnpm --filter @vocode/daemon build

      - name: Build voice sidecar
        run: echo "Skipping @vocode/voice on ubuntu (PortAudio/cgo)"

      - name: Run Go tests
        run: go test $(go list ./... | grep -v '/apps/voice')

  voice-linux:
    name: Build voice sidecar (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native deps (PortAudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config portaudio19-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build voice sidecar
        run: pnpm --filter @vocode/voice build

      - name: Run voice Go tests
        run: go test ./apps/voice/...

  voice-windows:
    name: Build voice sidecar (Windows)
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up MSYS2 (cached)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-pkg-config
          cache: true

      - name: Configure MSYS2_ROOT for build scripts
        shell: pwsh
        run: |
          $msysRoot = "${{ steps.msys2.outputs.msys2-location }}"
          $mingwBin = Join-Path $msysRoot "mingw64\bin"
          $pkgConfigPath = Join-Path $msysRoot "mingw64\lib\pkgconfig"
          $gcc = Join-Path $mingwBin "gcc.exe"
          $pkgConfig = Join-Path $mingwBin "pkg-config.exe"
          $pkgConf = Join-Path $mingwBin "pkgconf.exe"
          $pkgTool = if (Test-Path $pkgConfig) { $pkgConfig } else { $pkgConf }

          "MSYS2_ROOT=$msysRoot" >> $env:GITHUB_ENV
          "CGO_ENABLED=1" >> $env:GITHUB_ENV
          "CC=$gcc" >> $env:GITHUB_ENV
          "PKG_CONFIG=$pkgTool" >> $env:GITHUB_ENV
          "PKG_CONFIG_PATH=$pkgConfigPath" >> $env:GITHUB_ENV
          "Path=$mingwBin;$env:Path" >> $env:GITHUB_ENV

      - name: Build voice sidecar
        run: pnpm --filter @vocode/voice build

      - name: Run voice Go tests
        run: go test ./apps/voice/...
