name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  ci:
    name: Lint, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run protocol codegen
        run: pnpm codegen

      - name: Verify generated files are committed
        run: |
          git diff --exit-code || (
            echo "Generated files are out of date. Run 'pnpm codegen' and commit the changes."
            exit 1
          )

      - name: Lint TypeScript/JSON/CSS with Biome
        run: pnpm lint

      - name: Build VS Code extension
        run: pnpm --filter @vocode/vscode-extension build

      - name: Build daemon
        run: pnpm --filter @vocode/daemon build

      - name: Build voice sidecar
        run: echo "Skipping @vocode/voice on ubuntu (PortAudio/cgo)"

      - name: Run Go tests
        run: go test $(go list ./... | grep -v '/apps/voice')

  voice-linux:
    name: Build voice sidecar (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native deps (PortAudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config portaudio19-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build voice sidecar
        run: pnpm --filter @vocode/voice build

      - name: Run voice Go tests
        run: go test ./apps/voice/...

  voice-windows:
    name: Build voice sidecar (Windows)
    runs-on: windows-latest
    env:
      MSYS2_ROOT: C:\msys64
      CGO_ENABLED: "1"
      CC: C:\msys64\mingw64\bin\gcc.exe
      PKG_CONFIG: C:\msys64\mingw64\bin\pkgconf.exe
      PKG_CONFIG_PATH: C:\msys64\mingw64\lib\pkgconfig

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up MSYS2 (cached)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-pkg-config
          cache: true

      - name: Configure MSYS2_ROOT for build scripts
        shell: pwsh
        run: |
          echo "MSYS2_ROOT=C:\msys64" >> $env:GITHUB_ENV
          echo "CGO_ENABLED=1" >> $env:GITHUB_ENV
          echo "CC=C:\msys64\mingw64\bin\gcc.exe" >> $env:GITHUB_ENV
          echo "PKG_CONFIG=C:\msys64\mingw64\bin\pkgconf.exe" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=C:\msys64\mingw64\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "Path=C:\msys64\mingw64\bin;$env:Path" >> $env:GITHUB_ENV

      - name: Build voice sidecar
        run: pnpm --filter @vocode/voice build

      - name: Run voice Go tests
        run: go test ./apps/voice/...
